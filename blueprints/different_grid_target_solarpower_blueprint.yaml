blueprint:
  name: "Hysterese + Grid Target Steuerung"
  description: >
    Kombiniert zwei Logiken:
    - Grid Target wird kontinuierlich angepasst je nachdem ob geladen oder entladen wird.
    - Dabei gelten je nach aktuellem Sensorwert (Morgen/Abend) unterschiedliche Werte.
    - SOC-Grenzwert wird per Hysterese-Schwellenwert umgeschaltet.
    - Grid Target wird nur beim Morgen/Abend-Übergang neu gesetzt, nicht bei jeder Forecast-Änderung.
  domain: automation
  input:

    # ── Sensoren ─────────────────────────────────────────────────────────────
    power_sensor:
      name: "Hysterese-Sensor"
      description: "Sensor für die Hysterese-Schwellenwerte (z.B. Solar Forecast)."
      default: sensor.solar_forecast
      selector:
        entity:
          filter:
            domain: sensor

    charge_power_sensor:
      name: "System Charge Power Sensor"
      description: "Marstek Venus Ladeleistung."
      default: number.marstek_venus_1_ladeleistung
      selector:
        entity:
          filter:
            domain: number

    discharge_power_sensor:
      name: "System Discharge Power Sensor"
      description: "Marstek Venus Entladeleistung."
      default: number.marstek_venus_1_entladeleistung
      selector:
        entity:
          filter:
            domain: number

    # ── Entities ──────────────────────────────────────────────────────────────
    target_grid_power_number:
      name: "PD Target Grid Power Number"
      description: "Marstek Venus PD Target Grid Power Number Entity."
      default: number.marstek_venus_system_pd_target_grid_power
      selector:
        entity:
          filter:
            domain: number

    charge_soc_limit:
      name: "Lade-SOC-Grenzwert Entity"
      description: "Entity für den Lade-SOC-Grenzwert."
      default: number.marstek_venus_1_lade_soc_grenzwert
      selector:
        entity:
          filter:
            domain: number

    # ── Hysterese-Schwellen ───────────────────────────────────────────────────
    upper_threshold:
      name: "Morgen-Schwellenwert"
      description: "Sensor muss diesen Wert überschreiten (Morgen)."
      default: 900
      selector:
        number:
          min: 0
          max: 10000
          step: 10
          unit_of_measurement: W
          mode: box

    lower_threshold:
      name: "Abend-Schwellenwert"
      description: "Sensor muss diesen Wert unterschreiten (Abend)."
      default: 950
      selector:
        number:
          min: 0
          max: 10000
          step: 10
          unit_of_measurement: W
          mode: box

    # ── Active Power Threshold ────────────────────────────────────────────────
    active_threshold_w:
      name: "Active Power Threshold"
      description: "Lade-/Entladewerte unterhalb dieser Schwelle werden ignoriert (Rauschen)."
      default: 20
      selector:
        number:
          min: 0
          max: 500
          step: 5
          unit_of_measurement: W
          mode: box

    # ── Morgen ────────────────────────────────────────────────────────────────
    charge_target_on_w:
      name: "Grid Target While Charging (Morgen)"
      description: "Wird gesetzt solange geladen wird und Sensor >= Morgen-Schwellenwert. Negative Werte = Export ins Netz."
      default: -50
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    discharge_target_on_w:
      name: "Grid Target While Discharging (Morgen)"
      description: "Wird gesetzt solange entladen wird und Sensor >= Morgen-Schwellenwert. Positive Werte = Import aus dem Netz."
      default: 0
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    charge_soc_limit_value:
      name: "Lade-SOC-Grenzwert (Morgen)"
      description: "SOC-Grenzwert der morgens gesetzt wird (%)."
      default: 100
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

    # ── Abend ─────────────────────────────────────────────────────────────────
    charge_target_off_w:
      name: "Grid Target While Charging (Abend)"
      description: "Wird gesetzt solange geladen wird und Sensor < Morgen-Schwellenwert. Negative Werte = Export ins Netz."
      default: -10
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    discharge_target_off_w:
      name: "Grid Target While Discharging (Abend)"
      description: "Wird gesetzt solange entladen wird und Sensor < Morgen-Schwellenwert. Positive Werte = Import aus dem Netz."
      default: 50
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    discharge_soc_limit_value:
      name: "Lade-SOC-Grenzwert (Abend)"
      description: "SOC-Grenzwert der abends gesetzt wird (%)."
      default: 100
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

    # ── Grid Target: Idle ─────────────────────────────────────────────────────
    reset_when_idle:
      name: "Grid Target zurücksetzen wenn idle"
      description: "Grid Target auf Idle-Wert setzen wenn weder geladen noch entladen wird."
      default: false
      selector:
        boolean:

    idle_target_w:
      name: "Idle Grid Target"
      description: "Nur aktiv wenn 'Reset when idle' aktiviert ist."
      default: 0
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

variables:
  upper_threshold: !input upper_threshold
  lower_threshold: !input lower_threshold
  active_threshold_w: !input active_threshold_w
  reset_when_idle: !input reset_when_idle
  idle_target_w: !input idle_target_w
  charge_target_on_w: !input charge_target_on_w
  discharge_target_on_w: !input discharge_target_on_w
  charge_target_off_w: !input charge_target_off_w
  discharge_target_off_w: !input discharge_target_off_w
  charge_soc_limit_value: !input charge_soc_limit_value
  discharge_soc_limit_value: !input discharge_soc_limit_value
  charge_power_sensor: !input charge_power_sensor
  discharge_power_sensor: !input discharge_power_sensor
  target_grid_power_number: !input target_grid_power_number
  power_sensor: !input power_sensor

triggers:
  # Grid Target: kontinuierlich auf Lade-/Entladesensor reagieren
  - trigger: numeric_state
    entity_id: !input charge_power_sensor
    above: !input active_threshold_w
    id: charge_started
  - trigger: numeric_state
    entity_id: !input discharge_power_sensor
    above: !input active_threshold_w
    id: discharge_started
  - trigger: numeric_state
    entity_id: !input charge_power_sensor
    below: !input active_threshold_w
    id: charge_stopped
  - trigger: numeric_state
    entity_id: !input discharge_power_sensor
    below: !input active_threshold_w
    id: discharge_stopped
  - trigger: homeassistant
    event: start
    id: homeassistant_start
  # Hysterese: nur auf Schwellen-Übergänge reagieren
  - trigger: numeric_state
    entity_id: !input power_sensor
    above: !input upper_threshold
    id: morgen
  - trigger: numeric_state
    entity_id: !input power_sensor
    below: !input lower_threshold
    id: abend

actions:
  - variables:
      charge_w: "{{ states(charge_power_sensor) | float(0) }}"
      discharge_w: "{{ states(discharge_power_sensor) | float(0) }}"
      current_target_w: "{{ states(target_grid_power_number) | float(999999) }}"
      sensor_value: "{{ states(power_sensor) | float(0) }}"
      hysterese_on: "{{ sensor_value >= upper_threshold }}"
      active_charge_target: "{{ charge_target_on_w if hysterese_on else charge_target_off_w }}"
      active_discharge_target: "{{ discharge_target_on_w if hysterese_on else discharge_target_off_w }}"

  - choose:
      # ── Hysterese: Morgen ─────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'morgen' }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input charge_soc_limit
            data:
              value: "{{ charge_soc_limit_value }}"
          # Grid Target sofort auf Morgen-Werte umschalten
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ discharge_w > active_threshold_w and discharge_w >= charge_w }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input target_grid_power_number
                    data:
                      value: "{{ discharge_target_on_w }}"
              - conditions:
                  - condition: template
                    value_template: "{{ charge_w > active_threshold_w and charge_w > discharge_w }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input target_grid_power_number
                    data:
                      value: "{{ charge_target_on_w }}"

      # ── Hysterese: Abend ──────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'abend' }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: !input charge_soc_limit
            data:
              value: "{{ discharge_soc_limit_value }}"
          # Grid Target sofort auf Abend-Werte umschalten
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ discharge_w > active_threshold_w and discharge_w >= charge_w }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input target_grid_power_number
                    data:
                      value: "{{ discharge_target_off_w }}"
              - conditions:
                  - condition: template
                    value_template: "{{ charge_w > active_threshold_w and charge_w > discharge_w }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: !input target_grid_power_number
                    data:
                      value: "{{ charge_target_off_w }}"

      # ── Grid Target: Entladen ─────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id in ['discharge_started', 'charge_stopped', 'homeassistant_start']
                 and discharge_w > active_threshold_w
                 and discharge_w >= charge_w
                 and current_target_w != active_discharge_target }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input target_grid_power_number
            data:
              value: "{{ active_discharge_target }}"

      # ── Grid Target: Laden ────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id in ['charge_started', 'discharge_stopped', 'homeassistant_start']
                 and charge_w > active_threshold_w
                 and charge_w > discharge_w
                 and current_target_w != active_charge_target }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input target_grid_power_number
            data:
              value: "{{ active_charge_target }}"

      # ── Grid Target: Idle ─────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id in ['charge_stopped', 'discharge_stopped', 'homeassistant_start']
                 and reset_when_idle
                 and charge_w <= active_threshold_w
                 and discharge_w <= active_threshold_w
                 and current_target_w != idle_target_w }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input target_grid_power_number
            data:
              value: "{{ idle_target_w }}"

mode: restart
