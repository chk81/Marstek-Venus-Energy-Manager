blueprint:
  name: "Hysterese + Grid Target Steuerung"
  description: >
    Kombiniert zwei Logiken:
    - Grid Target wird kontinuierlich angepasst je nachdem ob geladen oder entladen wird.
    - Dabei gelten je nach aktuellem Sensorwert (ein/aus) unterschiedliche Grid Target Werte.
    - SOC-Grenzwert und Max. Entladeleistung werden per Hysterese-Schwellenwert umgeschaltet.
  domain: automation
  input:

    # ── Sensoren ─────────────────────────────────────────────────────────────
    power_sensor:
      name: "Hysterese-Sensor"
      description: "Sensor für die Hysterese-Schwellenwerte (z.B. PV-Leistung)."
      selector:
        entity:
          filter:
            domain: number

    charge_power_sensor:
      name: "System Charge Power Sensor"
      description: "Marstek Venus Ladeleistung."
      default: sensor.marstek_venus_system_system_charge_power
      selector:
        entity:
          filter:
            domain: number

    discharge_power_sensor:
      name: "System Discharge Power Sensor"
      description: "Marstek Venus Entladeleistung."
      default: sensor.marstek_venus_system_system_discharge_power
      selector:
        entity:
          filter:
            domain: sensor

    # ── Entities ──────────────────────────────────────────────────────────────
    target_grid_power_number:
      name: "PD Target Grid Power Number"
      description: "Marstek Venus PD Target Grid Power Number Entity."
      default: number.marstek_venus_system_pd_target_grid_power
      selector:
        entity:
          filter:
            domain: number

    charge_soc_limit:
      name: "Lade-SOC-Grenzwert Entity"
      description: "Entity für den Lade-SOC-Grenzwert."
      default: number.marstek_venus_1_lade_soc_grenzwert
      selector:
        entity:
          filter:
            domain: number

    max_discharge_power:
      name: "Max. Entladeleistung Entity"
      description: "Entity für die maximale Entladeleistung."
      default: number.marstek_venus_1_max_entladeleistung
      selector:
        entity:
          filter:
            domain: number

    # ── Hysterese-Schwellen ───────────────────────────────────────────────────
    upper_threshold:
      name: "Einschalt-Schwellenwert"
      description: "Sensor muss diesen Wert überschreiten um einzuschalten."
      default: 900
      selector:
        number:
          min: 0
          max: 10000
          step: 10
          unit_of_measurement: W
          mode: box

    lower_threshold:
      name: "Ausschalt-Schwellenwert"
      description: "Sensor muss diesen Wert unterschreiten um auszuschalten."
      default: 950
      selector:
        number:
          min: 0
          max: 10000
          step: 10
          unit_of_measurement: W
          mode: box

    # ── Active Power Threshold ────────────────────────────────────────────────
    active_threshold_w:
      name: "Active Power Threshold"
      description: "Lade-/Entladewerte unterhalb dieser Schwelle werden ignoriert (Rauschen)."
      default: 20
      selector:
        number:
          min: 0
          max: 500
          step: 5
          unit_of_measurement: W
          mode: box

    # ── Grid Target: Eingeschaltet ────────────────────────────────────────────
    charge_target_on_w:
      name: "Grid Target While Charging (Eingeschaltet)"
      description: "Wird gesetzt solange geladen wird und Sensor >= Einschalt-Schwellenwert. Negative Werte = Export ins Netz."
      default: -50
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    discharge_target_on_w:
      name: "Grid Target While Discharging (Eingeschaltet)"
      description: "Wird gesetzt solange entladen wird und Sensor >= Einschalt-Schwellenwert. Positive Werte = Import aus dem Netz."
      default: 0
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    # ── Grid Target: Ausgeschaltet ────────────────────────────────────────────
    charge_target_off_w:
      name: "Grid Target While Charging (Ausgeschaltet)"
      description: "Wird gesetzt solange geladen wird und Sensor < Einschalt-Schwellenwert. Negative Werte = Export ins Netz."
      default: -10
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    discharge_target_off_w:
      name: "Grid Target While Discharging (Ausgeschaltet)"
      description: "Wird gesetzt solange entladen wird und Sensor < Einschalt-Schwellenwert. Positive Werte = Import aus dem Netz."
      default: 50
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    # ── Grid Target: Idle ─────────────────────────────────────────────────────
    reset_when_idle:
      name: "Grid Target zurücksetzen wenn idle"
      description: "Grid Target auf Idle-Wert setzen wenn weder geladen noch entladen wird."
      default: false
      selector:
        boolean:

    idle_target_w:
      name: "Idle Grid Target"
      description: "Nur aktiv wenn 'Reset when idle' aktiviert ist."
      default: 0
      selector:
        number:
          min: -2500
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    # ── SOC + Entladeleistung beim Einschalten ────────────────────────────────
    charge_soc_limit_value:
      name: "Lade-SOC-Grenzwert beim Einschalten"
      description: "SOC-Grenzwert der beim Einschalten gesetzt wird (%)."
      default: 100
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

    charge_max_discharge_power_value:
      name: "Max. Entladeleistung beim Einschalten"
      description: "Maximale Entladeleistung die beim Einschalten gesetzt wird (W)."
      default: 0
      selector:
        number:
          min: 0
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

    # ── SOC + Entladeleistung beim Ausschalten ────────────────────────────────
    discharge_soc_limit_value:
      name: "Lade-SOC-Grenzwert beim Ausschalten"
      description: "SOC-Grenzwert der beim Ausschalten gesetzt wird (%)."
      default: 100
      selector:
        number:
          min: 0
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box

    discharge_max_discharge_power_value:
      name: "Max. Entladeleistung beim Ausschalten"
      description: "Maximale Entladeleistung die beim Ausschalten gesetzt wird (W)."
      default: 800
      selector:
        number:
          min: 0
          max: 2500
          step: 10
          unit_of_measurement: W
          mode: box

variables:
  upper_threshold: !input upper_threshold
  lower_threshold: !input lower_threshold
  active_threshold_w: !input active_threshold_w
  reset_when_idle: !input reset_when_idle
  idle_target_w: !input idle_target_w
  charge_target_on_w: !input charge_target_on_w
  discharge_target_on_w: !input discharge_target_on_w
  charge_target_off_w: !input charge_target_off_w
  discharge_target_off_w: !input discharge_target_off_w
  charge_soc_limit_value: !input charge_soc_limit_value
  discharge_soc_limit_value: !input discharge_soc_limit_value
  charge_max_discharge_power_value: !input charge_max_discharge_power_value
  discharge_max_discharge_power_value: !input discharge_max_discharge_power_value
  charge_power_sensor: !input charge_power_sensor
  discharge_power_sensor: !input discharge_power_sensor
  target_grid_power_number: !input target_grid_power_number
  power_sensor: !input power_sensor

triggers:
  - trigger: numeric_state
    entity_id: !input charge_power_sensor
    above: !input active_threshold_w
    id: charge_started
  - trigger: numeric_state
    entity_id: !input discharge_power_sensor
    above: !input active_threshold_w
    id: discharge_started
  - trigger: numeric_state
    entity_id: !input charge_power_sensor
    below: !input active_threshold_w
    id: charge_stopped
  - trigger: numeric_state
    entity_id: !input discharge_power_sensor
    below: !input active_threshold_w
    id: discharge_stopped
  - trigger: homeassistant
    event: start
    id: homeassistant_start
  - trigger: state
    entity_id: !input power_sensor
    id: sensor_change

conditions:
  - condition: template
    value_template: >
      {{ trigger.id != 'sensor_change'
         or (trigger.to_state.state not in ['unavailable', 'unknown', 'none']
             and trigger.from_state.state not in ['unavailable', 'unknown', 'none']) }}

actions:
  - variables:
      charge_w: "{{ states(charge_power_sensor) | float(0) }}"
      discharge_w: "{{ states(discharge_power_sensor) | float(0) }}"
      current_target_w: "{{ states(target_grid_power_number) | float(999999) }}"
      sensor_value: "{{ states(power_sensor) | float(0) }}"
      hysterese_on: "{{ sensor_value >= upper_threshold }}"
      hysterese_current: >
        {% if trigger.id == 'sensor_change' %}
          {{ trigger.to_state.state | float(0) }}
        {% else %}
          0
        {% endif %}
      hysterese_last: >
        {% if trigger.id == 'sensor_change' %}
          {{ trigger.from_state.state | float(0) }}
        {% else %}
          0
        {% endif %}
      active_charge_target: "{{ charge_target_on_w if hysterese_on else charge_target_off_w }}"
      active_discharge_target: "{{ discharge_target_on_w if hysterese_on else discharge_target_off_w }}"

  - choose:
      # ── Hysterese: Einschalten ────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'sensor_change'
                 and hysterese_last < upper_threshold
                 and hysterese_current >= upper_threshold }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input charge_soc_limit
            data:
              value: "{{ charge_soc_limit_value }}"
          - action: number.set_value
            target:
              entity_id: !input max_discharge_power
            data:
              value: "{{ charge_max_discharge_power_value }}"

      # ── Hysterese: Ausschalten ────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'sensor_change'
                 and hysterese_last >= lower_threshold
                 and hysterese_current < lower_threshold }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input charge_soc_limit
            data:
              value: "{{ discharge_soc_limit_value }}"
          - action: number.set_value
            target:
              entity_id: !input max_discharge_power
            data:
              value: "{{ discharge_max_discharge_power_value }}"

      # ── Grid Target: Entladen ─────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id in ['discharge_started', 'charge_stopped', 'homeassistant_start', 'sensor_change']
                 and discharge_w > active_threshold_w
                 and discharge_w >= charge_w
                 and current_target_w != active_discharge_target }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input target_grid_power_number
            data:
              value: "{{ active_discharge_target }}"

      # ── Grid Target: Laden ────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id in ['charge_started', 'discharge_stopped', 'homeassistant_start', 'sensor_change']
                 and charge_w > active_threshold_w
                 and charge_w > discharge_w
                 and current_target_w != active_charge_target }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input target_grid_power_number
            data:
              value: "{{ active_charge_target }}"

      # ── Grid Target: Idle ─────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id in ['charge_stopped', 'discharge_stopped', 'homeassistant_start']
                 and reset_when_idle
                 and charge_w <= active_threshold_w
                 and discharge_w <= active_threshold_w
                 and current_target_w != idle_target_w }}
        sequence:
          - action: number.set_value
            target:
              entity_id: !input target_grid_power_number
            data:
              value: "{{ idle_target_w }}"

mode: restart
